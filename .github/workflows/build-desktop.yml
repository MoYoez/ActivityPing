name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }} ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            os: windows
            arch: x64
          - name: Windows
            runner: windows-11-arm
            os: windows
            arch: arm64
          - name: macOS
            runner: macos-latest
            os: macos
            arch: arm64
          - name: Linux
            runner: ubuntu-22.04
            os: linux
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm tauri build

      - name: Upload Windows bundled output
        if: matrix.platform.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: activityping-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          compression-level: 0
          if-no-files-found: error

      - name: Upload macOS bundled output
        if: matrix.platform.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: activityping-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          compression-level: 0
          if-no-files-found: error

      - name: Upload Linux bundled output
        if: matrix.platform.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: activityping-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          compression-level: 0
          if-no-files-found: error
